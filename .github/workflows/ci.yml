name: CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: docker.io
  IMAGE_NAME: stayease/booking-service
  SONAR_ORG: stayease-sliit-2026
  SONAR_PROJECT: stayease-booking-service

jobs:
  # Stage 1: Checkout and Install
  checkout-and-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      # npm cache handled by setup-node 'cache: npm' above; avoid duplicate caching steps

  # Stage 2: Run Tests
  test:
    needs: checkout-and-install
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  # Stage 3: Security Scanning with SonarCloud
  sonarcloud:
    needs: checkout-and-install
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage
        continue-on-error: true

      - name: SonarCloud Scan
        # pin to a stable major version
        uses: SonarSource/sonarcloud-github-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
        continue-on-error: true

  # Stage 4: Build Docker Image
  build-image:
    needs: [test, sonarcloud]
    runs-on: ubuntu-latest
    # Only build/push images on push events and when registry credentials are present
    if: github.event_name == 'push' && (secrets.ACR_LOGIN_SERVER != '' || secrets.DOCKER_USERNAME != '')
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        if: secrets.ACR_LOGIN_SERVER != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Log in to Docker Hub (fallback)
        if: secrets.ACR_LOGIN_SERVER == '' && secrets.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image variables
        id: set-vars
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          if [ "${{ secrets.ACR_LOGIN_SERVER }}" != "" ]; then
            IMAGE_FULL=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          else
            IMAGE_FULL=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          fi
          echo "IMAGE_FULL=${IMAGE_FULL}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_FULL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Expose image as job output
        id: set-image
        run: echo "image=${{ env.IMAGE_FULL }}" >> $GITHUB_OUTPUT

    outputs:
      image: ${{ steps.set-image.outputs.image }}
  # Stage 5: Deploy to Azure (ACR -> App Service for Containers)
  deploy-azure:
    needs: build-image
    runs-on: ubuntu-latest
    # only deploy from main branch and when Azure credentials are present
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.AZURE_CREDENTIALS != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Azure Web App (set container)
        env:
          IMAGE: ${{ needs.build-image.outputs.image }}
        run: |
          echo "Deploying $IMAGE to Web App ${{ secrets.AZURE_WEBAPP_NAME }} in ${{ secrets.AZURE_RESOURCE_GROUP }}"
          az webapp config container set \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name $IMAGE \
            --docker-registry-server-url https://${{ secrets.ACR_LOGIN_SERVER }} \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

      - name: Restart Web App
        run: az webapp restart --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

  # Status Check
  status-check:
    needs: [checkout-and-install, test, sonarcloud, build-image]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check test result
        if: needs.test.result == 'failure'
        run: exit 1

      - name: All checks passed
        if: needs.test.result == 'success'
        run: echo "✅ All CI/CD checks passed!"
