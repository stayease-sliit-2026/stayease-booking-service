name: CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: docker.io
  IMAGE_NAME: stayease/booking-service
  SONAR_ORG: stayease-sliit-2026
  SONAR_PROJECT: stayease-booking-service

jobs:
  # Stage 1: Checkout and Install
  checkout-and-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.19.0]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      # npm cache handled by setup-node 'cache: npm' above; avoid duplicate caching steps

  # Stage 2: Run Tests
  test:
    needs: checkout-and-install
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  # Stage 3: Security Scanning with SonarCloud
  sonarcloud:
    needs: checkout-and-install
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage
        continue-on-error: true

      - name: SonarCloud Scan
        # pin to a stable major version
        uses: SonarSource/sonarcloud-github-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
        continue-on-error: true

  # Stage 4: Build Docker Image
  build-image:
    needs: [test, sonarcloud]
    runs-on: ubuntu-latest
    # Build image only on push events.
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine registry mode
        id: registry
        run: |
          if [ -n "${{ secrets.ACR_LOGIN_SERVER }}" ] && [ -n "${{ secrets.ACR_USERNAME }}" ] && [ -n "${{ secrets.ACR_PASSWORD }}" ]; then
            echo "mode=acr" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "mode=dockerhub" >> $GITHUB_OUTPUT
          else
            echo "mode=none" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        if: steps.registry.outputs.mode == 'acr'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Log in to Docker Hub (fallback)
        if: steps.registry.outputs.mode == 'dockerhub'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image variables
        id: set-vars
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          if [ "${{ steps.registry.outputs.mode }}" = "acr" ]; then
            IMAGE_FULL=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          elif [ "${{ steps.registry.outputs.mode }}" = "dockerhub" ]; then
            IMAGE_FULL=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          else
            IMAGE_FULL=
          fi
          echo "IMAGE_FULL=${IMAGE_FULL}" >> $GITHUB_ENV

      - name: Skip image push when no registry credentials
        if: steps.registry.outputs.mode == 'none'
        run: echo "No ACR/Docker Hub credentials found. Skipping image build and push."

      - name: Build and push Docker image
        if: steps.registry.outputs.mode != 'none'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_FULL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Expose image as job output
        id: set-image
        run: |
          if [ -n "${{ env.IMAGE_FULL }}" ]; then
            echo "image=${{ env.IMAGE_FULL }}" >> $GITHUB_OUTPUT
          else
            echo "image=" >> $GITHUB_OUTPUT
          fi

    outputs:
      image: ${{ steps.set-image.outputs.image }}
  # Stage 5: Deploy to Azure Container Apps
  deploy-azure:
    needs: build-image
    runs-on: ubuntu-latest
    # Only deploy from main branch on push events.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Azure deployment prerequisites
        id: azure-check
        run: |
          if [ -z "${{ needs.build-image.outputs.image }}" ]; then
            echo "can_deploy=false" >> $GITHUB_OUTPUT
            echo "reason=No built image output from build-image job" >> $GITHUB_OUTPUT
          elif [ -z "${{ secrets.AZURE_CREDENTIALS }}" ] || [ -z "${{ secrets.AZURE_RESOURCE_GROUP }}" ] || [ -z "${{ secrets.AZURE_CONTAINERAPP_NAME }}" ]; then
            echo "can_deploy=false" >> $GITHUB_OUTPUT
            echo "reason=Missing one or more Azure Container Apps secrets" >> $GITHUB_OUTPUT
          else
            echo "can_deploy=true" >> $GITHUB_OUTPUT
            echo "reason=ok" >> $GITHUB_OUTPUT
          fi

      - name: Skip Azure deployment
        if: steps.azure-check.outputs.can_deploy != 'true'
        run: |
          echo "Skipping deploy-azure: ${{ steps.azure-check.outputs.reason }}"

      - name: Azure Login
        if: steps.azure-check.outputs.can_deploy == 'true'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Azure Container App
        if: steps.azure-check.outputs.can_deploy == 'true'
        env:
          IMAGE: ${{ needs.build-image.outputs.image }}
        run: |
          echo "Deploying $IMAGE to Container App ${{ secrets.AZURE_CONTAINERAPP_NAME }} in ${{ secrets.AZURE_RESOURCE_GROUP }}"
          az extension add --name containerapp --upgrade --yes
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINERAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image $IMAGE

      - name: Show Container App URL
        if: steps.azure-check.outputs.can_deploy == 'true'
        run: |
          FQDN=$(az containerapp show --name ${{ secrets.AZURE_CONTAINERAPP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)
          echo "Container App URL: https://${FQDN}"

  # Status Check
  status-check:
    needs: [checkout-and-install, test, sonarcloud, build-image]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check test result
        if: needs.test.result == 'failure'
        run: exit 1

      - name: All checks passed
        if: needs.test.result == 'success'
        run: echo "✅ All CI/CD checks passed!"
