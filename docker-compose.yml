services:
  booking-service:
    build: .
    container_name: stayease-booking-service
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-3003}:3003"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
