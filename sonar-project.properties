sonar.projectKey=stayease-booking-service
sonar.organization=stayease-sliit-2026

# Metadata
sonar.projectName=StayEase Booking Service
sonar.projectVersion=1.0.0
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Code coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.js,**/node_modules/**,**/dist/**,**/coverage/**

# Exclusions
sonar.exclusions=node_modules/**,dist/**,coverage/**,build/**

# Analysis scope
sonar.inclusions=src/**/*.js

# Code smell threshold
sonar.projectBaseDir=./

# Quality gate settings
sonar.qualitygate.wait=true

# Languages
sonar.language=js
